<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1724;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2540;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#375bd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" />

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#chainGrad)" stroke-width="1.5" opacity="0.5" />

  <!-- Chain link left -->
  <rect x="14" y="43" width="18" height="14" rx="7" fill="none" stroke="url(#chainGrad)" stroke-width="3.5" filter="url(#glow)" />

  <!-- Chain link right -->
  <rect x="68" y="43" width="18" height="14" rx="7" fill="none" stroke="url(#chainGrad)" stroke-width="3.5" filter="url(#glow)" />

  <!-- Connecting bar between links -->
  <rect x="28" y="48" width="44" height="4" rx="2" fill="url(#chainGrad)" opacity="0.6" />

  <!-- Central pulse / signal dot -->
  <circle cx="50" cy="50" r="6" fill="url(#arrowGrad)" filter="url(#glow)" />
  <circle cx="50" cy="50" r="3" fill="#ffffff" opacity="0.9" />

  <!-- Arrow up (simulate flow / report going up to chain) -->
  <polygon points="50,22 45,31 55,31" fill="url(#arrowGrad)" filter="url(#glow)" />
  <rect x="47.5" y="31" width="5" height="9" rx="1.5" fill="url(#arrowGrad)" />

  <!-- Arrow down (simulate strategy execution going down) -->
  <polygon points="50,78 45,69 55,69" fill="#22d3ee" opacity="0.7" filter="url(#glow)" />
  <rect x="47.5" y="60" width="5" height="9" rx="1.5" fill="#22d3ee" opacity="0.7" />
</svg>