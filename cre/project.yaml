# ==========================================================================
# CRE PROJECT SETTINGS
# ==========================================================================
# RPC endpoints for each chain the workflows interact with.
#
# 🔧 ethereum-testnet-sepolia:
#    Replace with your own Alchemy/Infura Sepolia endpoint for reliability.
#    Must match SEPOLIA_RPC_URL in root/.env
#
# 🤖 ethereum-mainnet (staging-settings only):
#    AUTO-FILLED by: npm run setup  (or any npm run provision:*)
#    Points to your Tenderly vNet public RPC — do not edit manually.
#    CRE uses this to read on-chain state (TOKEN_OUT, balanceOf) via EVMClient.
#
# 🔧 Custom contracts (optional):
#    If you deployed your own SimulationRegistry + SimulationJobQueue:
#    1. Update registryAddress + jobQueueAddress in cre/config.staging.json
#    2. Update REGISTRY_ADDRESS + JOB_QUEUE_ADDRESS in root/.env
#    No changes needed in this file for contract swaps.
# ==========================================================================

staging-settings:
  rpcs:
    - chain-name: ethereum-testnet-sepolia
      url: https://ethereum-sepolia-rpc.publicnode.com # replace with your own RPC if needed

    - chain-name: ethereum-mainnet
      url: https://virtual.mainnet.eu.rpc.tenderly.co/725c010c-faa5-4c66-ad53-6dabca8d5265
      # ↑ AUTO-FILLED by npm run setup — do not edit manually

production-settings:
  rpcs:
    - chain-name: ethereum-testnet-sepolia
      url: https://ethereum-sepolia-rpc.publicnode.com # replace with production RPC
    # ethereum-mainnet not needed in production — vNet is staging-only
