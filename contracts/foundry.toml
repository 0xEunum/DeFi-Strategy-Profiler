[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200

[profile.default.fuzz]
runs = 256


remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

[rpc_endpoints]
# Testnet RPCs
anvil = "http://127.0.0.1:8545"
sepolia = "https://eth-sepolia.g.alchemy.com/v2/${ALCHEMY_KEY}"
arbSepolia = "https://arb-sepolia.g.alchemy.com/v2/${ALCHEMY_KEY}"
opSepolia = "https://opt-sepolia.g.alchemy.com/v2/${ALCHEMY_KEY}"

# Mainnet RPCs
eth-mainnet = "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
arb-mainnet = "https://arb-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
op-mainnet = "https://opt-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"

[etherscan]
eth-sepolia = { key = "${ETHERSCAN_API_KEY}", chain = "sepolia" }
arbEth-sepolia = { key = "${ETHERSCAN_API_KEY}", chain = "sepolia" }
opEth-sepolia = { key = "${ETHERSCAN_API_KEY}", chain = "sepolia" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
